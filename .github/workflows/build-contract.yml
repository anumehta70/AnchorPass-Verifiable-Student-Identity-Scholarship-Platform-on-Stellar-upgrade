name: Build Soroban Contract

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/build-contract.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install Stellar CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo stellar/stellar-cli --pattern "*x86_64-unknown-linux-gnu.tar.gz" --dir .
          tar -xvzf stellar-cli-*.tar.gz
          find . -name "stellar" -type f -exec sudo mv {} /usr/local/bin/ \;

      - name: Build Contract
        run: |
          cd contracts/anchorpass
          stellar contract build

      - name: Upload Contract Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anchorpass-contract
          path: contracts/target/wasm32-unknown-unknown/release/anchorpass.wasm

      - name: Deploy to Testnet
        run: |
          stellar keys generate --network testnet ci-deployer
          WASM_FILE=$(find contracts/target/wasm32v1-none/release -name "*.wasm" | head -n 1)
          CONTRACT_ID=$(stellar contract deploy --wasm $WASM_FILE --network testnet --source ci-deployer)
          echo "==========================================="
          echo "🚀 CONTRACT DEPLOYED SUCCESSFULLY 🚀"
          echo "Your Contract ID is: $CONTRACT_ID"
          echo "==========================================="
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_ENV
