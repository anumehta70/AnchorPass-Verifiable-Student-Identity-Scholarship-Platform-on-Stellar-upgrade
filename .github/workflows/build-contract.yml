name: Build Soroban Contract

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/build-contract.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build Contract
        run: |
          cd contracts/anchorpass
          stellar contract build

      - name: Upload Contract Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anchorpass-contract
          path: contracts/target/wasm32-unknown-unknown/release/anchorpass.wasm

      - name: Deploy to Testnet
        run: |
          stellar keys generate --network testnet ci-deployer
          CONTRACT_ID=$(stellar contract deploy --wasm contracts/target/wasm32-unknown-unknown/release/anchorpass.wasm --network testnet --source ci-deployer)
          echo "==========================================="
          echo "🚀 CONTRACT DEPLOYED SUCCESSFULLY 🚀"
          echo "Your Contract ID is: $CONTRACT_ID"
          echo "==========================================="
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_ENV
